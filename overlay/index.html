<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Red Light Green Light - Game Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #gameCanvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      image-rendering: auto;
      /* Smooth scaling untuk semua device */
      will-change: transform;
    }

    /* ==================== CAMERA OVERLAY ==================== */
    #cameraContainer {
      display: none;
      position: absolute;
      bottom: 40px;
      right: 40px;
      width: 280px;
      height: 210px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      border: 2px solid #1E90FF;
      cursor: move;
      z-index: 1000;
      touch-action: none;
    }
    #cameraContainer.active {
      display: block;
    }
    #cameraVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror effect */
    }
    #cameraLabel {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-family: monospace;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #cameraContainer:hover #cameraLabel {
      opacity: 1;
    }
    #cameraClose {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(226, 75, 74, 0.9);
      border: 2px solid white;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #cameraContainer:hover #cameraClose {
      opacity: 1;
    }
    #cameraClose:hover {
      background: #E24B4A;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1080" height="1920"></canvas>

  <!-- Camera overlay -->
  <div id="cameraContainer">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <div id="cameraLabel">📷 HOST CAMERA</div>
    <button id="cameraClose">✕</button>
  </div>

  <script>
    /**
     * Responsive canvas scaling untuk portrait mode
     * Canvas internal: 1080x1920 (portrait 9:16)
     */
    function resizeCanvas() {
      const canvas = document.getElementById('gameCanvas');
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const cw = 1080;
      const ch = 1920;

      // Scale "contain" — seluruh canvas terlihat
      const scale = Math.min(vw / cw, vh / ch);

      canvas.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => setTimeout(resizeCanvas, 100));
    } else {
      setTimeout(resizeCanvas, 100);
    }
  </script>

  <!-- Howler.js untuk sound effects -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <!-- Socket.io client -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
  <!-- Game logic -->
  <script src="game.js"></script>
</body>
</html>
